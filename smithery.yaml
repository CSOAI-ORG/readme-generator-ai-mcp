name: readme-generator-ai-mcp
description: Readme Generator Ai automation via MCP. Includes generate readme, add
  badges, generate api docs. By MEOK AI Labs.
version: 1.0.0
tools:
- name: generate_readme
  description: MEOK AI Labs tool.
  parameters:
  - name: project_name
    type: string
    required: true
  - name: description
    type: string
    required: true
  - name: language
    type: string
    required: false
- name: add_badges
  description: MEOK AI Labs tool.
  parameters:
  - name: project_name
    type: string
    required: true
  - name: badges
    type: string
    required: false
- name: generate_api_docs
  description: MEOK AI Labs tool.
  parameters:
  - name: function_signatures
    type: string
    required: true
- name: generate_contributing
  description: MEOK AI Labs tool.
  parameters:
  - name: project_name
    type: string
    required: true
